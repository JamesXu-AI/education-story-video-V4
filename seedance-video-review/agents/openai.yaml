interface:
  display_name: "Seedance Video Review"
  short_description: "理解剪辑语义的画面、声音与连续性检查"
  default_prompt: "Use $seedance-video-review to inspect the actual picture and sound. Read and classify the authored cut or transition before judging continuity; compare wide views and seams with the Location-owned fixed set and embedded population, and reject random entrants, duplicates, disappearances, or density drift. Allow motivated changes of angle, shot size, composition, focus, palette, place, or time, plus semantically equivalent internal-cut shifts and adjacent stable movable-prop landings; inherit the actual accepted ending in the successor. Fail semantic contradictions, incomplete actions, inaccessible or duplicated props, causal timing errors, or real transition artifacts. Return NO_ISSUES or concise actionable issues to the owning module, then recheck only corrected work."
