interface:
  display_name: "Seedance Screenplay Writer"
  short_description: "Write cinematic Scenes with mandatory same-Scene serial continuity"
  default_prompt: "Use $screenplay-writer to eliminate stage-play structure at the Screenplay source. Give every Scene an objective, obstacle, power relation, turning point, changed outcome, visible spatial/action progression, and exit impulse; give every Dramatic Beat one narrative change, physical objective, visible action, important reaction, spatial change, differentiated ensemble roles, one visual focus, and exact block coverage. Embed dialogue in behavior and reject lineups, camera-facing presentation, synchronized crowd reactions, and mechanical turn-taking before Storyboard. Then design the strongest finished dramatic flow and the fewest performable 4–15 second Seedance Segments. Pairwise-audit and merge compatible same-Scene material. Every retained adjacent same-Scene boundary must be serial: use state_match for a soft first_frame_reference from the approved predecessor last frame as an ordinary reference image, never a strict/API first-frame lock; use continuous_motion for predecessor_video_reference when action, performance, blocking, facing, eyelines, entrance/contact, or camera motion is unfinished. Allow independent only at a genuine Scene, primary-time, primary-place, or enclosing-event discontinuity. Reject meaningless holds, enforce role/image/dialogue budgets, and run the internal semantic Screenplay and boundary reviews before deterministic build/check. Leave actual URLs, provider attempts, reference bindings, cameras, and lighting implementation downstream."
