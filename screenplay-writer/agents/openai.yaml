interface:
  display_name: "Seedance Screenplay Writer"
  short_description: "Write independent, edit-ready Seedance screenplay Segments"
  default_prompt: "Use $screenplay-writer to author the fewest performable 4–15 second dramatic Segments, each containing one clear, complete micro-plot or micro-conflict rather than an isolated line, reaction, action wave, or future camera cut. Pairwise-audit and merge adjacent same-Scene material whenever its complete combined dramatic unit fits one compatible Segment. Never pad runtime with a static profile, empty stare, repeated breathing, redundant reaction, or unmotivated silence; every hold must change pressure, information, relationship, expectation, or result readability. Each Segment independently fits one reusable location master, involves at most three project-level dialogue-owning characters with at most two on-screen and at most one O.S./V.O., uses at most two explicit silent group-role types, contains at most three Dialogue turns, and stays within six total static image slots; determine dialogue ownership across the complete screenplay, not only from who speaks locally. Keep dialogue occupancy at or below 45% for action-led, 60% for mixed, or 72% for dialogue-led Segments, and leave about 0.8 seconds after completed dialogue/action for a readable result and safe edit. After building the real audio timeline, repair every occupancy, closure, overload, continuity, waiting, and merge-audit failure before invoking either gate. Fast-gate PASS unlocks production-design image work immediately while the bounded detailed review runs concurrently; detailed PASS remains required before cinematography or video generation. State only independent, state-match, continuous-motion, or earlier-Scene-return continuity needs, leaving actual references, cameras, and scheduling to cinematography."
